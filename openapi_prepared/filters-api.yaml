components:
  schemas:
    Filter:
      type: object
      description: A filter object containing boolean clauses that combine field conditions.
      properties:
        must:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/FieldCondition'
              - $ref: '#/components/schemas/HasIdCondition'
          description: All conditions must match for a point to be included (AND logic).
        must_not:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/FieldCondition'
              - $ref: '#/components/schemas/HasIdCondition'
          description: Points matching any condition in this array are excluded.
        should:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/FieldCondition'
              - $ref: '#/components/schemas/HasIdCondition'
          description: At least one condition must match for a point to be included (OR logic).
      example:
        must:
          - key: "category"
            match:
              value: "A"
          - key: "value"
            range:
              gte: 5
              lte: 50

    FieldCondition:
      type: object
      description: A condition that targets a payload field by key and applies a match or range operator.
      required:
        - key
      properties:
        key:
          type: string
          description: Name of the payload field to filter on.
        match:
          type: object
          description: Exact value match. The point is included when the field value equals the specified value.
          properties:
            value:
              oneOf:
                - type: string
                - type: number
                - type: boolean
              description: Value to match against. Supports strings, numbers, and booleans.
        range:
          type: object
          description: Numeric range condition. Combine multiple operators for between queries.
          properties:
            gt:
              type: number
              description: Greater than. Matches values strictly above this number.
            gte:
              type: number
              description: Greater than or equal. Matches values at or above this number.
            lt:
              type: number
              description: Less than. Matches values strictly below this number.
            lte:
              type: number
              description: Less than or equal. Matches values at or below this number.

    HasIdCondition:
      type: object
      description: A condition that matches points by their ID.
      required:
        - has_id
      properties:
        has_id:
          type: array
          items:
            oneOf:
              - type: integer
              - type: string
          description: Array of point IDs to match. Points with an ID in this array are included.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin JWT or access token for authenticating requests to VectorAI DB.
