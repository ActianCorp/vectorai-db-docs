openapi: 3.0.3
info:
  title: Actian VectorAI DB - Grouped Search API
  description: |
    Grouped search operations cluster results by a payload field, returning a set number of groups with the best-matching points in each group.

    Grouping is useful when you want diverse results across a category such as product, document, or author. For example, you can retrieve the top 3 products with the 2 best-matching variants in each, or the top 5 documents with the best chunk from each.

    The grouping field must have a field index before you can group by it. Create the index with the `create_field_index` operation on the Points API.

    ## Operations

    - `search_groups` — vector similarity search with result grouping
    - `query_groups` — universal query with result grouping (supports raw vectors, point IDs, and named vector references)

    ## Python SDK

    ```python
    from actian_vectorai import VectorAIClient, FieldType
    import random

    with VectorAIClient("localhost:50051") as client:
        # Create index on grouping field
        client.points.create_field_index(
            "my_collection",
            "product",
            FieldType.FieldTypeKeyword
        )

        # Search with grouping
        query_vec = [random.gauss(0, 1) for _ in range(4)]
        groups = client.points.search_groups(
            "my_collection",
            vector=query_vec,
            group_by="product",
            limit=3,
            group_size=2
        )

        for group in groups.groups:
            print(f"Product: {group.id}")
            for hit in group.hits:
                print(f"  ID: {hit.id}, Score: {hit.score}")
    ```
