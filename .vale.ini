StylesPath = .vale/styles

MinAlertLevel = suggestion

Packages = Google

[formats]
mdx = md

[*.md]
BasedOnStyles = Google

# Adjust rules for technical documentation
Google.We = suggestion
Google.FirstPerson = suggestion
Google.Passive = suggestion
Google.WordList = warning
Google.Acronyms = suggestion
Google.Parens = suggestion

[*.mdx]
BasedOnStyles = Google
BlockIgnores = (?s) *(<[A-Z][\w]*[^>]*>.*?</[A-Z][\w]*>|<[A-Z][\w]*[^/>]*/>)
TokenIgnores = (\w+={[^}]+}|import .* from .*)

# Adjust rules for technical documentation
Google.We = suggestion
Google.FirstPerson = suggestion
Google.Passive = suggestion
Google.WordList = warning
Google.Acronyms = suggestion
Google.Parens = suggestion

[home/**]
BasedOnStyles = Google
# Enable Google style checks for home directory with relaxed acronym rules
Google.Headings = YES
Google.Parens = suggestion
Google.Spelling = YES
Google.WordList = YES
Google.Units = YES
Google.Acronyms = suggestion
Google.FirstPerson = suggestion
Google.We = suggestion